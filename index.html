<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Floral Atelier</title>
    <style>
        :root {
            --red: #4a0000;
            --yellow: #f4d03f;
            --white: #ffffff;
            --gold: #ebde69;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Cinzel', serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
            background: var(--white);
            transition: background 1s ease;
            touch-action: manipulation; /* Prevents double-tap zoom delay */
        }

        /* --- STAGE 1: SCROLL STORY --- */
        .section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .scroll-hint {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: #888;
            animation: bounce 2s infinite;
            z-index: 50;
        }

        #enter-btn {
            display: none;
            margin-top: 40px;
            padding: 15px 40px;
            border: 1px solid white;
            background: none;
            color: white;
            cursor: pointer;
            letter-spacing: 5px;
            font-size: 1.2rem;
            transition: 0.5s;
        }

        #enter-btn:hover {
            background: white;
            color: black;
        }

        /* --- STAGE 2: SELECTION HUB --- */
        #hub {
            display: none;
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #1a0000 0%, #000 100%);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .bouquet-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
            width: 90%;
            max-width: 600px;
        }

        .b-card {
            cursor: pointer;
            text-align: center;
            padding: 10px;
        }

        .b-card img {
            width: 100%;
            max-width: 150px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.1));
            transition: 0.4s;
        }

        .b-card:hover img {
            transform: translateY(-10px);
            filter: drop-shadow(0 0 20px var(--red));
        }

        /* --- STAGE 3: THE WORKSHOP --- */
        #workshop {
            display: none;
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            z-index: 2000;
            overflow: hidden;
        }

        .workspace {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 100%;
        }

        .shelf {
            width: 120px;
            background: #111;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            border-right: 1px solid #333;
        }

        .part {
            width: 80px;
            cursor: grab;
            margin: 0 auto;
            touch-action: none; /* Required for smooth touch dragging */
        }

        .table {
            flex-grow: 1;
            background: radial-gradient(circle, #2a1b15 0%, #0a0a0a 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .drop-zone {
            width: 90%;
            height: 90%;
            position: relative;
        }

        .placed {
            position: absolute;
            cursor: move;
            touch-action: none;
            user-select: none;
        }

        /* --- FINALE --- */
        #finale-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #letter-box {
            display: none;
            background: #fffdf5;
            color: #333;
            padding: 30px;
            width: 80%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 0 30px var(--red);
        }

        .btn-group {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tool {
            background: rgba(0,0,0,0.5);
            border: 1px solid #444;
            color: white;
            padding: 10px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .workspace { flex-direction: column-reverse; }
            .shelf { 
                width: 100%; height: 100px; 
                flex-direction: row; border-right: none; border-top: 1px solid #333;
            }
            .part { width: 60px; }
            .btn-group { top: 10px; right: 10px; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>

<body>
    <div class="scroll-hint" id="hint">SCROLL TO BEGIN</div>

    <div class="section" id="sec1"><h1>ONLY</h1></div>
    <div class="section" id="sec2"><h1>FOR</h1></div>
    <div class="section" id="sec3">
        <h1 style="color: white; margin-bottom: 20px;">YOU🤍</h1>
        <button id="enter-btn" onclick="openHub()">Enter In The Game</button>
    </div>

    <div id="hub">
        <h2 style="letter-spacing: 3px;">SELECT A BOUQUET</h2>
        <div class="bouquet-grid">
            <div class="b-card" onclick="openWorkshop()"><img src="sun.png"><p>SUNFLOWER</p></div>
            <div class="b-card" onclick="openWorkshop()"><img src="rose.png"><p>RED ROSE</p></div>
            <div class="b-card" onclick="openWorkshop()"><img src="flowers1.png"><p>BLACK ROSE</p></div>
            <div class="b-card" onclick="openWorkshop()"><img src="flora1.png"><p>MIXTURE</p></div>
        </div>
    </div>

    <div id="workshop">
        <div class="workspace">
            <div class="shelf">
                <img src="black.png" class="part" id="f1" draggable="true">
                <img src="sunny.png" class="part" id="f2" draggable="true">
                <img src="roseee.png" class="part" id="f3" draggable="true">
                <div id="wrap_paper" class="part" style="width: 50px; height: 70px; background: #c4a484;"></div>
                <div id="bow" class="part" style="font-size: 40px;">🎀</div>
                <div id="heart" class="part" style="font-size: 40px;">❤️</div>
            </div>
            <div class="table">
                <div class="drop-zone" id="assembly-area"></div>
            </div>
        </div>
        <div class="btn-group">
            <button class="tool" onclick="location.reload()">RESTART</button>
            <button class="tool" style="color: #ff2e2e;" onclick="triggerFinale()">GIVE ❤️</button>
        </div>
    </div>

    <div id="finale-overlay">
        <div class="envelope" id="env" onclick="revealLetter()" style="font-size: 80px; cursor:pointer;">📩</div>
        <div id="letter-box">
            <p>You made this beautiful, just like you make everything else better. Thank you for being in my world.</p>
            <button class="tool" onclick="location.reload()" style="background:var(--red); color:white; width:100%">Close</button>
        </div>
    </div>

    <script>
        let zCounter = 10;

        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            const btn = document.getElementById('enter-btn');
            const hint = document.getElementById('hint');
            if (scroll > 500) {
                document.body.style.background = "#2a0000";
                btn.style.display = "block";
                hint.style.display = "none";
            } else {
                document.body.style.background = "#ebde69";
                btn.style.display = "none";
                hint.style.display = "block";
            }
        });

        function openHub() { document.getElementById('hub').style.display = 'flex'; }
        function openWorkshop() { 
            document.getElementById('hub').style.display = 'none';
            document.getElementById('workshop').style.display = 'block'; 
        }

        // Logic to create clones
        const parts = document.querySelectorAll('.part');
        const assembly = document.getElementById('assembly-area');

        parts.forEach(p => {
            p.addEventListener('click', () => {
                createClone(p.id);
            });
        });

        function createClone(id) {
            const original = document.getElementById(id);
            const clone = original.cloneNode(true);
            clone.classList.add('placed');
            clone.style.left = '50px';
            clone.style.top = '50px';
            
            if(id === 'wrap_paper') {
                clone.style.width = "200px";
                clone.style.height = "280px";
                clone.style.zIndex = 1;
            } else {
                clone.style.width = "120px";
                clone.style.zIndex = zCounter++;
            }

            // --- SMOOTH DRAGGING LOGIC ---
            let active = false;
            let currentX, currentY, initialX, initialY;
            let xOffset = 0, yOffset = 0;

            const dragStart = (e) => {
                clone.style.zIndex = zCounter++;
                if (e.type === "touchstart") {
                    initialX = e.touches[0].clientX - xOffset;
                    initialY = e.touches[0].clientY - yOffset;
                } else {
                    initialX = e.clientX - xOffset;
                    initialY = e.clientY - yOffset;
                }
                active = true;
            };

            const dragMove = (e) => {
                if (active) {
                    e.preventDefault();
                    let clientX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
                    let clientY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;
                    currentX = clientX - initialX;
                    currentY = clientY - initialY;
                    xOffset = currentX;
                    yOffset = currentY;
                    
                    // Uses hardware acceleration for smoothness
                    clone.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
                }
            };

            const dragEnd = () => { active = false; };

            clone.addEventListener("touchstart", dragStart, {passive: false});
            clone.addEventListener("mousedown", dragStart);
            window.addEventListener("touchmove", dragMove, {passive: false});
            window.addEventListener("mousemove", dragMove);
            window.addEventListener("touchend", dragEnd);
            window.addEventListener("mouseup", dragEnd);

            assembly.appendChild(clone);
        }

        function triggerFinale() {
            document.getElementById('finale-overlay').style.display = 'flex';
            setInterval(createPetal, 400);
        }

        function createPetal() {
            const p = document.createElement('div');
            p.innerHTML = '🌸';
            p.style.position = 'fixed';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = '-20px';
            p.style.zIndex = 4000;
            p.style.transition = 'top 4s linear, transform 4s linear';
            document.body.appendChild(p);
            setTimeout(() => { 
                p.style.top = '110vh'; 
                p.style.transform = `rotate(${Math.random() * 360}deg)`;
            }, 50);
            setTimeout(() => p.remove(), 4000);
        }

        function revealLetter() {
            document.getElementById('env').style.display = 'none';
            document.getElementById('letter-box').style.display = 'block';
        }
    </script>
</body>
</html>
