<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Floral Atelier</title>
    <style>
        :root {
            --red: #4a0000;
            --yellow: #c9d650;
            --white: #ebde69;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            font-family: 'Cinzel', serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
            background: var(--white);
            transition: background 1s ease;
        }

        /* Make images responsive */
        img {
            max-width: 100%;
            height: auto;
        }

        /* --- STAGE 1 --- */

        .section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            transition: 1s;
        }

        .section h1 {
            font-size: clamp(2rem, 5vw, 4rem);
        }

        .scroll-hint {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: .8rem;
            letter-spacing: 3px;
            color: #888;
            animation: bounce 2s infinite;
            z-index: 50;
        }

        #enter-btn {
            display: none;
            margin-top: 30px;
            padding: 12px 30px;
            border: 1px solid white;
            background: none;
            color: white;
            cursor: pointer;
            letter-spacing: 5px;
            font-size: clamp(14px, 2vw, 18px);
            transition: .5s;
        }

        #enter-btn:hover {
            background: white;
            color: black;
        }

        /* --- HUB --- */

        #hub {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a0000 0%, #000 100%);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        .bouquet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 800px;
            margin-top: 40px;
        }

        .b-card {
            cursor: pointer;
            transition: .4s;
            text-align: center;
        }

        .b-card img {
            width: 100%;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, .1));
            transition: .4s;
        }

        .b-card:hover img {
            transform: translateY(-15px) scale(1.08);
            filter: drop-shadow(0 0 25px var(--red));
        }

        /* --- WORKSHOP --- */

        #workshop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 200;
            overflow: hidden;
        }

        .workspace {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
        }

        /* Shelf */

        .shelf {
            width: 20vw;
            min-width: 120px;
            max-width: 200px;
            background: #111;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            border-right: 1px solid #333;
            z-index: 201;
        }

        .shelf p {
            color: #555;
            font-size: .7rem;
            letter-spacing: 2px;
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
        }

        .part {
            width: 20vw;
            max-width: 100px;
            cursor: grab;
            filter: drop-shadow(0 5px 5px black);
            transition: .2s;
        }

        .part:active {
            cursor: grabbing;
        }

        /* Table */

        .table {
            flex-grow: 1;
            position: relative;
            background: url('https://www.transparenttextures.com/patterns/dark-wood.png'), #1a0f0a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        /* Drop Zone */

        .drop-zone {
            width: 90vw;
            max-width: 600px;
            height: 75vh;
            max-height: 800px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, .05);
        }

        .placed {
            position: absolute;
            cursor: move;
            transform-origin: center;
            transition: outline .2s;
        }

        /* --- FINALE --- */

        #finale-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .85);
            z-index: 500;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #letter-box {
            display: none;
            background: #fffdf5;
            color: #333;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(255, 46, 46, .3);
            max-width: 90%;
            width: 400px;
            font-family: 'Georgia', serif;
            text-align: center;
        }

        .envelope {
            font-size: clamp(60px, 8vw, 80px);
            cursor: pointer;
            transition: .5s;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, .2));
        }

        .bloom-petal {
            position: fixed;
            color: #ffcccc;
            pointer-events: none;
            z-index: 600;
            font-size: 20px;
        }

        /* Buttons */

        .btn-group {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 300;
        }

        button.tool {
            background: #111;
            border: 1px solid #444;
            color: #888;
            padding: 10px 18px;
            cursor: pointer;
            letter-spacing: 2px;
            font-size: 14px;
        }

        button.tool:hover {
            border-color: white;
            color: white;
        }

        /* --- MOBILE --- */

        @media (max-width:768px) {

            .workspace {
                flex-direction: column;
            }

            .shelf {
                width: 100%;
                flex-direction: row;
                overflow-x: auto;
                overflow-y: hidden;
                border-right: none;
                border-bottom: 1px solid #333;
            }

            .shelf p {
                display: none;
            }

            .part {
                width: 70px;
                max-width: none;
            }

            .table {
                height: 80vh;
            }

            .drop-zone {
                width: 95vw;
                height: 70vh;
            }

            .b-card {
                width: 120px;
                margin: auto;
            }

            .btn-group {
                right: 10px;
                bottom: 10px;
            }

        }

        /* animation */

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-10px)
            }
        }

<body>

    <div class="scroll-hint" id="hint">SCROLL</div>

    <div class="section" id="sec1">
        <h1>ONLY</h1>
    </div>
    <div class="section" id="sec2">
        <h1>FOR</h1>
    </div>
    <div class="section" id="sec3">
        <h1 style="color: var(--red);">YOU🤍</h1>
        <button id="enter-btn" onclick="openHub()">START</button>
    </div>

    <div id="hub">
        <h2 style="font-size: 1rem; letter-spacing: 3px;">CHOOSE A SOUL</h2>
        <div class="bouquet-grid">
            <div class="b-card" onclick="openWorkshop()"><img src="sun.png">
                <p style="font-size:0.6rem">SUNFLOWER</p>
            </div>
            <div class="b-card" onclick="openWorkshop()"><img src="rose.png">
                <p style="font-size:0.6rem">RED ROSE</p>
            </div>
            <div class="b-card" onclick="openWorkshop()"><img src="flowers1.png">
                <p style="font-size:0.6rem">BLACK ROSE</p>
            </div>
            <div class="b-card" onclick="openWorkshop()"><img src="flora1.png">
                <p style="font-size:0.6rem">MIXTURE</p>
            </div>
        </div>
    </div>

    <div id="workshop">
        <div class="workspace">
            <div class="shelf">
                <img src="black.png" class="part" id="f1" draggable="true">
                <img src="sunny.png" class="part" id="f2" draggable="true">
                <img src="roseee.png" class="part" id="f3" draggable="true">
                <div style="width:50px; height:70px; background:#c4a484; flex-shrink:0" class="part" id="wrap_paper"
                    draggable="true"></div>
                <div style="font-size:40px;" class="part" id="bow" draggable="true">🎀</div>
                <div style="font-size:40px;" class="part" id="heart" draggable="true">❤️</div>
            </div>
            <div class="table">
                <div class="drop-zone" id="assembly-area"></div>
            </div>
        </div>

        <div class="btn-group">
            <button class="tool" onclick="location.reload()">RESTART</button>
            <button class="tool" style="color: #ff2e2e;" onclick="triggerFinale()">GIVE ❤️</button>
        </div>
    </div>

    <div id="finale-overlay">
        <div class="envelope" id="env" onclick="revealLetter()">📩</div>
        <div id="letter-box">
            <p>You made this beautiful, just like you make everything else better. Thank you for being in my world.</p>
            <button class="tool" onclick="location.reload()" style="background:var(--red); color:white;">Close</button>
        </div>
    </div>

    <script>
        let zCounter = 10;

        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            const btn = document.getElementById('enter-btn');
            if (scroll > 1000) {
                document.body.style.background = "#2a0000";
                btn.style.display = "block";
            } else {
                document.body.style.background = "#fff";
            }
        });

        function openHub() { document.getElementById('hub').style.display = 'flex'; }
        function openWorkshop() { document.getElementById('workshop').style.display = 'block'; }

        // Mobile-friendly drag and drop logic
        const parts = document.querySelectorAll('.part');
        const assembly = document.getElementById('assembly-area');

        parts.forEach(p => {
            p.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', e.target.id));
            // Add click-to-add for mobile
            p.addEventListener('click', () => {
                const fakeEvent = { clientX: window.innerWidth / 2, clientY: window.innerHeight / 2 };
                createClone(p.id, fakeEvent);
            });
        });

        assembly.addEventListener('dragover', (e) => e.preventDefault());
        assembly.addEventListener('drop', (e) => {
            e.preventDefault();
            createClone(e.dataTransfer.getData('text'), e);
        });

        function createClone(id, e) {
            const original = document.getElementById(id);
            const clone = original.cloneNode(true);
            clone.classList.add('placed');
            clone.style.position = 'absolute';

            const rect = assembly.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Responsive Sizing
            const isMobile = window.innerWidth < 768;
            if (id === 'wrap_paper') {
                clone.style.zIndex = 1;
                clone.style.width = isMobile ? "80vw" : "400px";
                clone.style.height = isMobile ? "60vh" : "550px";
            } else {
                clone.style.zIndex = zCounter++;
                clone.style.width = isMobile ? "100px" : "180px";
            }

            clone.style.left = (x - 50) + 'px';
            clone.style.top = (y - 50) + 'px';

            // Interaction
            clone.addEventListener('click', () => { clone.style.zIndex = zCounter++; });

            // Allow dragging items already placed (simple version)
            let isDragging = false;
            clone.onmousedown = (ev) => { isDragging = true; };
            window.onmousemove = (ev) => {
                if (isDragging) {
                    clone.style.left = (ev.clientX - rect.left - 50) + 'px';
                    clone.style.top = (ev.clientY - rect.top - 50) + 'px';
                }
            };
            window.onmouseup = () => { isDragging = false; };

            assembly.appendChild(clone);
        }

        function triggerFinale() {
            document.getElementById('finale-overlay').style.display = 'flex';
            setInterval(createPetal, 300);
        }

        function createPetal() {
            const p = document.createElement('div');
            p.innerHTML = '🌸';
            p.className = 'bloom-petal';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = '-20px';
            p.style.transition = `top 3s linear`;
            document.body.appendChild(p);
            setTimeout(() => { p.style.top = '110vh'; }, 10);
            setTimeout(() => p.remove(), 4000);
        }

        function revealLetter() {
            document.getElementById('env').style.display = 'none';
            document.getElementById('letter-box').style.display = 'block';
        }
    </script>
</body>
