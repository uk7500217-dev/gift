<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Floral Atelier</title>
    <style>
        :root { --red: #4a0000; --yellow: #f4d03f; --white: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Cinzel', serif; background: var(--white); overflow-x: hidden; width: 100%; height: 100%; }

        /* --- STAGE 1: SCROLL STORY --- */
        .section { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; transition: 1s; }
        .scroll-hint { position: fixed; bottom: 20px; width: 100%; text-align: center; font-size: 0.7rem; letter-spacing: 3px; color: #888; animation: bounce 2s infinite; z-index: 50; }
        
        #enter-btn { display: none; margin-top: 30px; padding: 12px 30px; border: 1px solid white; background: none; color: white; cursor: pointer; letter-spacing: 3px; font-size: 1rem; transition: 0.5s; }

        /* --- STAGE 2: SELECTION HUB --- */
        #hub { display: none; position: fixed; inset: 0; background: radial-gradient(circle, #1a0000 0%, #000 100%); z-index: 100; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 20px; }
        .bouquet-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            width: 100%; 
            max-width: 600px; 
            margin-top: 30px; 
        }
        .b-card { cursor: pointer; transition: 0.4s; text-align: center; }
        .b-card img { width: 80%; max-width: 150px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }

        /* --- STAGE 3: RESPONSIVE WORKSHOP --- */
        #workshop { display: none; position: fixed; inset: 0; background: #0a0a0a; z-index: 200; }
        .workspace { display: flex; flex-direction: row; width: 100%; height: 100%; }

        /* Mobile Sidebar becomes a Bottom Dock */
        .shelf { 
            width: 120px; background: #111; padding: 15px; 
            display: flex; flex-direction: column; gap: 15px; 
            overflow-y: auto; border-right: 1px solid #333; 
        }
        .part { width: 80%; margin: 0 auto; cursor: grab; filter: drop-shadow(0 5px 5px black); }

        .table { flex-grow: 1; position: relative; background: #1a0f0a; overflow: hidden; }
        .drop-zone { width: 100%; height: 100%; position: relative; }
        .placed { position: absolute; cursor: move; transform-origin: center; touch-action: none; }

        /* --- MOBILE ADAPTATION (Phones/Tabs) --- */
        @media (max-width: 768px) {
            .workspace { flex-direction: column-reverse; }
            .shelf { 
                width: 100%; height: 100px; 
                flex-direction: row; overflow-x: auto; overflow-y: hidden;
                border-right: none; border-top: 1px solid #333; padding: 10px;
            }
            .part { width: 60px; height: 60px; }
            .section h1 { font-size: 1.5rem; }
            #letter-box { width: 85%; padding: 20px; }
        }

        /* --- FINALE --- */
        #finale-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; align-items: center; justify-content: center; }
        #letter-box { display: none; background: #fffdf5; color: #333; padding: 30px; border-radius: 5px; max-width: 90%; font-family: serif; text-align: center; }
        .envelope { font-size: 60px; cursor: pointer; }
        .bloom-petal { position: fixed; pointer-events: none; z-index: 600; }

        .btn-group { position: fixed; top: 10px; right: 10px; display: flex; gap: 8px; z-index: 300; }
        button.tool { background: rgba(0,0,0,0.6); border: 1px solid #444; color: #fff; padding: 8px 12px; font-size: 0.7rem; cursor: pointer; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div class="scroll-hint" id="hint">SCROLL</div>

    <div class="section" id="sec1"><h1>ONLY</h1></div>
    <div class="section" id="sec2"><h1>FOR</h1></div>
    <div class="section" id="sec3">
        <h1 style="color: var(--red);">YOU🤍</h1>
        <button id="enter-btn" onclick="openHub()">START</button>
    </div>

    <div id="hub">
        <h2 style="font-size: 1rem; letter-spacing: 3px;">CHOOSE A SOUL</h2>
        <div class="bouquet-grid">
            <div class="b-card" onclick="openWorkshop()"><img src="sun.png"><p style="font-size:0.6rem">SUNFLOWER</p></div>
            <div class="b-card" onclick="openWorkshop()"><img src="rose.png"><p style="font-size:0.6rem">RED ROSE</p></div>
            <div class="b-card" onclick="openWorkshop()"><img src="flowers1.png"><p style="font-size:0.6rem">BLACK ROSE</p></div>
            <div class="b-card" onclick="openWorkshop()"><img src="flora1.png"><p style="font-size:0.6rem">MIXTURE</p></div>
        </div>
    </div>

    <div id="workshop">
        <div class="workspace">
            <div class="shelf">
                <img src="black.png" class="part" id="f1" draggable="true">
                <img src="sunny.png" class="part" id="f2" draggable="true">
                <img src="roseee.png" class="part" id="f3" draggable="true">
                <div style="width:50px; height:70px; background:#c4a484; flex-shrink:0" class="part" id="wrap_paper" draggable="true"></div>
                <div style="font-size:40px;" class="part" id="bow" draggable="true">🎀</div>
                <div style="font-size:40px;" class="part" id="heart" draggable="true">❤️</div>
            </div>
            <div class="table">
                <div class="drop-zone" id="assembly-area"></div>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="tool" onclick="location.reload()">RESTART</button>
            <button class="tool" style="color: #ff2e2e;" onclick="triggerFinale()">GIVE ❤️</button>
        </div>
    </div>

    <div id="finale-overlay">
        <div class="envelope" id="env" onclick="revealLetter()">📩</div>
        <div id="letter-box">
            <p>You made this beautiful, just like you make everything else better. Thank you for being in my world.</p>
            <button class="tool" onclick="location.reload()" style="background:var(--red); color:white;">Close</button>
        </div>
    </div>

    <script>
        let zCounter = 10;

        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            const btn = document.getElementById('enter-btn');
            if (scroll > 1000) { 
                document.body.style.background = "#2a0000"; 
                btn.style.display = "block"; 
            } else {
                document.body.style.background = "#fff";
            }
        });

        function openHub() { document.getElementById('hub').style.display = 'flex'; }
        function openWorkshop() { document.getElementById('workshop').style.display = 'block'; }

        // Mobile-friendly drag and drop logic
        const parts = document.querySelectorAll('.part');
        const assembly = document.getElementById('assembly-area');

        parts.forEach(p => {
            p.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', e.target.id));
            // Add click-to-add for mobile
            p.addEventListener('click', () => {
                const fakeEvent = { clientX: window.innerWidth/2, clientY: window.innerHeight/2 };
                createClone(p.id, fakeEvent);
            });
        });

        assembly.addEventListener('dragover', (e) => e.preventDefault());
        assembly.addEventListener('drop', (e) => {
            e.preventDefault();
            createClone(e.dataTransfer.getData('text'), e);
        });

        function createClone(id, e) {
            const original = document.getElementById(id);
            const clone = original.cloneNode(true);
            clone.classList.add('placed');
            clone.style.position = 'absolute';
            
            const rect = assembly.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Responsive Sizing
            const isMobile = window.innerWidth < 768;
            if(id === 'wrap_paper') {
                clone.style.zIndex = 1; 
                clone.style.width = isMobile ? "80vw" : "400px";
                clone.style.height = isMobile ? "60vh" : "550px";
            } else {
                clone.style.zIndex = zCounter++;
                clone.style.width = isMobile ? "100px" : "180px";
            }

            clone.style.left = (x - 50) + 'px';
            clone.style.top = (y - 50) + 'px';

            // Interaction
            clone.addEventListener('click', () => { clone.style.zIndex = zCounter++; });
            
            // Allow dragging items already placed (simple version)
            let isDragging = false;
            clone.onmousedown = (ev) => { isDragging = true; };
            window.onmousemove = (ev) => {
                if(isDragging) {
                    clone.style.left = (ev.clientX - rect.left - 50) + 'px';
                    clone.style.top = (ev.clientY - rect.top - 50) + 'px';
                }
            };
            window.onmouseup = () => { isDragging = false; };

            assembly.appendChild(clone);
        }

        function triggerFinale() {
            document.getElementById('finale-overlay').style.display = 'flex';
            setInterval(createPetal, 300);
        }

        function createPetal() {
            const p = document.createElement('div');
            p.innerHTML = '🌸';
            p.className = 'bloom-petal';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = '-20px';
            p.style.transition = `top 3s linear`;
            document.body.appendChild(p);
            setTimeout(() => { p.style.top = '110vh'; }, 10);
            setTimeout(() => p.remove(), 4000);
        }

        function revealLetter() {
            document.getElementById('env').style.display = 'none';
            document.getElementById('letter-box').style.display = 'block';
        }
    </script>
</body>
</html>
